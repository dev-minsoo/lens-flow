name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v$PACKAGE_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build package
        id: pack
        run: npm pack

      - name: Read package asset
        id: pkg
        run: |
          ASSET="$(node -e 'const pkg = require("./package.json"); const normalizedName = pkg.name.replace(/^@/, "").replace(/\//g, "-"); process.stdout.write(`${normalizedName}-${pkg.version}.tgz`);')"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        env:
          ASSET: ${{ steps.pkg.outputs.asset }}
        run: |
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep -Fxv "$GITHUB_REF_NAME" | head -n1)"

          {
            echo "## Install"
            echo "- Download \`$ASSET\` from the release assets below and install it from Lens/OpenLens/FreeLens Extensions."
            echo
            echo "## Compare changes"
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "- https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$GITHUB_REF_NAME"
            else
              echo "- Initial release"
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.pkg.outputs.asset }}
          bodyFile: RELEASE_NOTES.md
          commit: ${{ github.sha }}
          makeLatest: true
          replacesArtifacts: true
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
