name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "v$PACKAGE_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm pack

      - name: Read package asset
        id: pkg
        run: echo "asset=$(ls lens-flow-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.pkg.outputs.asset }}
          commit: ${{ github.sha }}
          generateReleaseNotes: true
          makeLatest: true
          replacesArtifacts: true
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
